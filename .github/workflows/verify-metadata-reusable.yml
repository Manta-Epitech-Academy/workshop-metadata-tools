# Reusable workflow: run from workshop repositories via `workflow_call`.
name: Verify metadata

on:
  workflow_call:

jobs:
  metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out workshop repository
        uses: actions/checkout@v4

      - name: Check out workshop-metadata-tools
        uses: actions/checkout@v4
        with:
          repository: Manta-Epitech-Academy/workshop-metadata-tools
          path: workshop-metadata-tools
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r "${GITHUB_WORKSPACE}/workshop-metadata-tools/requirements.txt"

      - name: Sync metadata.yaml (create default if missing, refresh toc)
        env:
          PYTHONPATH: ${{ github.workspace }}/workshop-metadata-tools
        run: python "${GITHUB_WORKSPACE}/workshop-metadata-tools/sync_metadata_toc.py"

      - name: Generate README.md from metadata.yaml
        env:
          PYTHONPATH: ${{ github.workspace }}/workshop-metadata-tools
        run: python "${GITHUB_WORKSPACE}/workshop-metadata-tools/generate_readme.py"

      - name: Fail if metadata.yaml is out of date
        run: |
          if git status --porcelain -- metadata.yaml | grep -q .; then
            echo "::error::metadata.yaml is out of date. Run locally to fix:"
            echo "  PYTHONPATH=workshop-metadata-tools python workshop-metadata-tools/sync_metadata_toc.py"
            git diff -- metadata.yaml || true
            exit 1
          fi

      - name: Commit README.md if regenerated
        run: |
          if git status --porcelain -- README.md | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: regenerate README.md from metadata.yaml [skip ci]"
            git push
          fi

      - name: Verify toc vs markdown and competency rules
        env:
          PYTHONPATH: ${{ github.workspace }}/workshop-metadata-tools
        run: python "${GITHUB_WORKSPACE}/workshop-metadata-tools/check_toc.py"
